spring:
  application:
    name: ai-analysis-service

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

  datasource:
    url: jdbc:mysql://localhost:3306/logmind?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:logmind}
    password: ${MYSQL_PASSWORD:logmind_secret}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate # Flyway owns the schema — JPA only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # Per-service history table — see logmind/application.yml for rationale
    table: flyway_schema_history_ai

server:
  port: 3004
  error:
    include-message: always # include error messages in responses (dev mode)

logging:
  level:
    com.aiService: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# LLM provider: stub | ollama | openai | groq | gemini
#  - stub:  no API key, canned JSON
#  - ollama: free local (https://ollama.com) — ollama pull <model>
#  - openai, groq, gemini: set the matching api-key (free tiers / promos are defined by each vendor)
ai:
  llm:
    provider: ${AI_LLM_PROVIDER:stub}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:llama3.2}

openai:
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}

groq:
  base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
  api-key: ${GROQ_API_KEY:}
  model: ${GROQ_MODEL:llama-3.3-70b-versatile}

gemini:
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.0-flash}
