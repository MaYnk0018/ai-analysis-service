spring:
  application:
    name: ai-analysis-service

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

  datasource:
    url: jdbc:mysql://localhost:3306/logmind?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate # Flyway owns the schema — JPA only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  error:
    include-message: always # include error messages in responses (dev mode)

logging:
  level:
    com.aiService: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

ai-analysis-service:
  claude:
    api-key: ${CLAUDE_API_KEY}
    model: claude-3-5-sonnet-20240620
    max-tokens: 10000
    temperature: 0.7
    top-p: 1.0
    frequency-penalty: 0.0
    presence-penalty: 0.0
    stop-sequences: ["\n\n"]
    response-format: json_object
    response-format-type: json
